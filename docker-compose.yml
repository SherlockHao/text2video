services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./vendor:/app/vendor

  worker:
    build: .
    command: python -m arq app.ai.worker.WorkerSettings
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./vendor:/app/vendor

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: text2video
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
